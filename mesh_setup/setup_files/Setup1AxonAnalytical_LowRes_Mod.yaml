geometry:
  cell_shape: cylinder
  ncell: 1
  rmin: 5
  rmax: 5
  dmin: 0.1
  dmax: 0.2
  height: 20
  deformation: [0.0, 0.0]   # small → inline
  include_in: false
  in_ratio: 0.6
  ecs_shape: no_ecs
  ecs_ratio: 0.5
  refinement: 1

pde:
  diffusivity_in: 0.002
  diffusivity_out: 0.002
  diffusivity_ecs: 0.002
  relaxation_in: .inf
  relaxation_out: .inf
  relaxation_ecs: .inf
  initial_density_in: 1.0
  initial_density_out: 1.0
  initial_density_ecs: 1.0
  permeability_in_out: 1.0e-4
  permeability_out_ecs: 1.0e-4
  permeability_in: 0
  permeability_out: 0
  permeability_ecs: 0

gradient:
  values: {start: 0, stop: 10001, incr: 1000}
  values_type: b
  sequence_type: PGSE
  sequence_deltas:
    # - {delta: 5000.0, Delta: 10000.0}
    - {delta: 5000.0, Delta: 6000.0}
    # - {delta: 5000.0, Delta: 50000.0}
  num_directions: 30
  # direction_file: mesh_setup/PointSets/Elec030.txt

mf:
  length_scale: 8
  neig_max: 600
  ninterval: 300